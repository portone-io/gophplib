on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4.3.0
        with:
          go-version: '1.20'
      - run: |
          # Check if the code is formatted properly
          OUTPUT=$(gofmt -d -e -s .)
          if [[ "${OUTPUT}" ]]; then
            cat <<EOF
          Go files were not formatted properly.

          ${OUTPUT}

          To fix this, run:

              gofmt -w -s .
          EOF
            exit 1
          fi

          go build
          go test
          go vet

        # TODO: golangci-lint
      - uses: dominikh/staticcheck-action@9716614d4101e79b4340dd97b10e54d68234e431 # v1.4.1
        with:
          version: 2023.1.6
          install-go: false
      - if: success() && github.ref == 'refs/heads/main'
        uses: ncruces/go-coverage-report@dfc237255099f2d25066babde51253992175e365 # v0.3.2
